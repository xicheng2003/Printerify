<svg width="240" height="240" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Printerify logo</title>
  <desc id="desc">Printerify printer logo using the original path shape with a clean polished finish.</desc>
  <defs>
    <linearGradient id="blueStroke" x1="4" y1="5" x2="20" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5F8CFF"/>
      <stop offset="0.55" stop-color="#2F66F2"/>
      <stop offset="1" stop-color="#1752D8"/>
    </linearGradient>
    <linearGradient id="slateStroke" x1="7" y1="12" x2="18.5" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3F5567"/>
      <stop offset="1" stop-color="#1F3446"/>
    </linearGradient>
    <linearGradient id="paperFill" x1="8" y1="13.5" x2="16" y2="20.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F6FA"/>
    </linearGradient>
    <filter id="cardShadow" x="-2" y="-1" width="28" height="29" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1.1" flood-color="#1B3354" flood-opacity="0.1"/>
    </filter>
    <filter id="markShadow" x="1.5" y="3.8" width="21.5" height="18.7" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0.55" stdDeviation="0.45" flood-color="#0E2D61" flood-opacity="0.18"/>
    </filter>
    <filter id="frontShadow" x="5.7" y="11.3" width="14.4" height="11.6" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0.45" stdDeviation="0.35" flood-color="#061827" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="1" y="1" width="22" height="22" rx="5" fill="#FAFCFF"/>
    <rect x="1.35" y="1.35" width="21.3" height="21.3" rx="4.65" stroke="#E7EEF8" stroke-width="0.7"/>
  </g>

  <g filter="url(#markShadow)">
    <path d="M7 17H5C3.89543 17 3 16.1046 3 15V11C3 9.89543 3.89543 9 5 9H19C20.1046 9 21 9.89543 21 11V15C21 16.1046 20.1046 17 19 17H17" stroke="url(#blueStroke)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M17 9V7C17 5.89543 16.1046 5 15 5H9C7.89543 5 7 5.89543 7 7V9" stroke="url(#blueStroke)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M5.15 10H18.85C19.49 10 20 10.51 20 11.15V14.85C20 15.49 19.49 16 18.85 16H17V13H7V16H5.15C4.51 16 4 15.49 4 14.85V11.15C4 10.51 4.51 10 5.15 10Z" fill="#FFFFFF" opacity="0.82"/>

  <g filter="url(#frontShadow)">
    <rect x="7" y="13" width="10" height="8" rx="1" fill="url(#paperFill)"/>
    <rect x="7" y="13" width="10" height="8" rx="1" stroke="url(#slateStroke)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M17 13H19V11" stroke="url(#slateStroke)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
